name: fluxdo
description: "A new Flutter project."
publish_to: 'none'
version: 0.2.9+2026041815

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  collection: ^1.19.1
  dio: ^5.9.0
  http: ^1.6.0
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  native_dio_adapter: ^1.3.0
  flutter_secure_storage: ^9.2.2
  flutter_inappwebview: ^6.2.0-beta.3
  cached_network_image: ^3.4.1
  octo_image: ^2.1.0
  flutter_cache_manager: ^3.4.1
  flutter_riverpod: ^3.1.0
  flutter_widget_from_html: ^0.17.1
  extended_image_lite:
    path: packages/extended_image_lite
  enhanced_cookie_jar:
    path: packages/enhanced_cookie_jar
  re_highlight: ^0.0.3
  google_fonts: ^8.0.0
  share_plus: ^12.0.1
  cross_file: ^0.3.4+2
  open_filex: ^4.7.0
  file_picker: ^10.3.10
  intl: ^0.20.2
  url_launcher: ^6.3.1
  font_awesome_flutter: ^10.12.0
  phosphor_flutter: ^2.1.0
  # NOTE: If updating font_awesome_flutter, run:
  #   dart run tool/gen_fa_name_mapping.dart
  shared_preferences: ^2.5.4
  dynamic_color: ^1.8.1
  scroll_to_index: ^3.0.1
  visibility_detector: ^0.4.0+2
  markdown: ^7.2.2
  image_picker: ^1.2.1
  super_clipboard: ^0.9.1
  gal: ^2.3.2
  pangutext:
    path: packages/pangutext
  ai_model_manager:
    path: packages/ai_model_manager
  paper_shaders:
    path: packages/paper_shaders
  flutter_local_notifications: ^21.0.0
  jovial_svg: ^1.1.29
  html: ^0.15.5
  dio_smart_retry: ^7.0.1
  extended_nested_scroll_view: ^6.0.0
  popover: ^0.4.0
  uuid: ^4.5.2
  logger: ^2.5.0
  path_provider: ^2.1.5
  path: ^1.9.1
  dns_client: ^1.3.1
  cronet_http: ^1.7.0
  package_info_plus: ^8.1.2
  pro_image_editor: ^11.18.4
  flutter_image_compress: ^2.4.0
  image: ^4.7.2
  flutter_math_fork: ^0.7.2
  device_info_plus: ^12.3.0
  connectivity_plus: ^7.0.0
  ua_client_hints: ^1.4.1
  ota_update: ^7.1.0
  app_links: ^7.0.0
  chat_bottom_container: ^0.4.0
  flutter_avif: ^3.1.0
  catcher_2: ^2.1.5

  window_manager: ^0.5.1
  flutter_acrylic: ^1.1.4

  flutter_dynamic_icon_plus: ^1.4.0  # 动态应用图标切换
  flutter_foreground_task: ^9.2.0  # Android 前台服务保活
  workmanager: ^0.9.0+3            # iOS BGTaskScheduler

  chewie: any
  video_player: any
  rhttp:
    git:
      url: https://github.com/Lingyan000/rhttp_plus.git
      path: rhttp
  dio_compatibility_layer: ^0.1.1
  ffi: any
dependency_overrides:
  # super_clipboard 0.9.1 要求 device_info_plus <12.0.0，
  # 但实际 12.x 接口兼容，强制使用项目版本
  device_info_plus: ^12.3.0
  flutter_inappwebview_linux:
    path: packages/flutter_inappwebview_linux

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/logo.svg
    - assets/logo_modern.svg
    - assets/logo_modern_light.svg
    - assets/images/
    - assets/certs/

  fonts:
    - family: MiSans
      fonts:
        - asset: assets/fonts/MiSans-Regular.ttf












































